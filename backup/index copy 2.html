<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מתכנן שבועי</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background: #eef1f5;
      color: #333;
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────────────────────────── */
    header {
      background: #1e3a5f;
      color: #fff;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 6px rgba(0,0,0,.35);
      flex-wrap: wrap;
      gap: 8px;
    }
    header h1 { font-size: 1.25rem; letter-spacing: .4px; font-weight: 600; }
    .header-btns { display: flex; gap: 6px; flex-wrap: wrap; }
    .hbtn {
      padding: 5px 13px;
      border: 1px solid rgba(255,255,255,.35);
      border-radius: 5px;
      background: transparent;
      color: #fff;
      font-size: .8rem;
      cursor: pointer;
      transition: background .15s;
      font-family: inherit;
    }
    .hbtn:hover { background: rgba(255,255,255,.15); }
    .hbtn.accent { background: rgba(255,255,255,.15); border-color: rgba(255,255,255,.5); }
    .hbtn.accent:hover { background: rgba(255,255,255,.28); }

    /* ── Status bar ─────────────────────────────────────────────────── */
    .status-bar {
      background: #2c4a6e;
      color: #a8c0d8;
      font-size: .73rem;
      padding: 4px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    #saveIndicator { color: #6dbf7e; font-weight: 600; min-width: 60px; }

    /* ── Calendar container ──────────────────────────────────────────── */
    .cal-wrap { padding: 16px; overflow-x: auto; }

    table.calendar {
      border-collapse: collapse;
      width: 100%;
      table-layout: fixed;
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 14px rgba(0,0,0,.1);
    }
    table.calendar thead th {
      background: #1e3a5f;
      color: #fff;
      padding: 10px 6px;
      font-size: .82rem;
      font-weight: 600;
      text-align: center;
    }
    table.calendar thead th:first-child { width: 52px; font-size: .75rem; }

    /* ── Week label cell ─────────────────────────────────────────────── */
    table.calendar tbody td.wk-label {
      background: #f0f4f8;
      color: #7a96b0;
      font-size: .68rem;
      font-weight: 700;
      text-align: center;
      vertical-align: middle;
      border-left: 1px solid #d8e2ea;
      border-bottom: 1px solid #dde4ec;
      padding: 4px 2px;
      user-select: none;
    }
    table.calendar tbody tr.past-week td.wk-label { background: #f5f7fa; color: #a0b4c6; }

    /* ── Day cells ───────────────────────────────────────────────────── */
    table.calendar tbody td.day-cell {
      border: 1px solid #dde4ec;
      vertical-align: top;
      padding: 5px 5px 4px;
      min-height: 100px;
      position: relative;
    }
    table.calendar tbody td.day-cell.is-past {
      background: #f2f3f5;
    }
    table.calendar tbody td.day-cell.is-past .day-num { color: #b0b8c1; }
    table.calendar tbody td.day-cell.is-past .day-date { color: #c0c8d0; }
    table.calendar tbody td.day-cell.is-today {
      border-color: #3a8cdf !important;
      border-width: 2px !important;
    }
    table.calendar tbody td.day-cell.is-weekend:not(.is-past) { background: #fdfcff; }
    table.calendar tbody td.day-cell.is-weekend.is-past { background: #f0f1f4; }

    /* ── Day header ──────────────────────────────────────────────────── */
    .day-header { margin-bottom: 3px; user-select: none; }
    .day-date { font-size: .67rem; color: #a0b4c4; line-height: 1.2; }
    .day-num {
      font-size: .9rem;
      font-weight: 700;
      color: #2c3e50;
      line-height: 1.1;
    }
    .day-num.today-num {
      color: #3a8cdf;
      background: #e8f2fc;
      display: inline-block;
      width: 22px;
      height: 22px;
      line-height: 22px;
      border-radius: 50%;
      text-align: center;
      font-size: .8rem;
    }

    /* ── Activities list ─────────────────────────────────────────────── */
    .activities { display: flex; flex-direction: column; gap: 2px; min-height: 2px; }

    .activity-item {
      display: flex;
      align-items: flex-start;
      gap: 3px;
      border-radius: 3px;
      padding: 2px 5px 2px 6px;
      font-size: .74rem;
      line-height: 1.35;
      cursor: default;
    }
    .activity-item .act-text { flex: 1; word-break: break-word; }
    .activity-item .act-actions {
      display: flex;
      gap: 2px;
      opacity: 0;
      transition: opacity .15s;
      flex-shrink: 0;
    }
    .activity-item:hover .act-actions { opacity: 1; }
    .act-icon {
      cursor: pointer;
      font-size: .68rem;
      padding: 1px 3px;
      border-radius: 2px;
      opacity: .7;
      transition: opacity .1s, background .1s;
      line-height: 1.4;
    }
    .act-icon:hover { opacity: 1; background: rgba(0,0,0,.12); }

    /* ── Add button ──────────────────────────────────────────────────── */
    .add-btn {
      display: inline-block;
      margin-top: 4px;
      font-size: .7rem;
      color: #b8c9d6;
      cursor: pointer;
      padding: 1px 4px;
      border-radius: 3px;
      transition: color .12s, background .12s;
      user-select: none;
    }
    .add-btn:hover { color: #607d8b; background: #e8edf0; }

    /* ── Inline add/edit form ────────────────────────────────────────── */
    .act-form {
      margin-top: 5px;
      padding: 7px;
      background: #f8fafc;
      border: 1px solid #ccd6e0;
      border-radius: 5px;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
    }
    .act-form input[type=text] {
      width: 100%;
      padding: 4px 6px;
      border: 1px solid #ccd6e0;
      border-radius: 4px;
      font-size: .78rem;
      outline: none;
      font-family: inherit;
      background: #fff;
    }
    .act-form input[type=text]:focus { border-color: #3a8cdf; box-shadow: 0 0 0 2px rgba(58,140,223,.15); }
    .swatches { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; }
    .swatch {
      width: 16px; height: 16px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      outline: 2px solid transparent;
      transition: transform .1s, outline-color .1s;
      flex-shrink: 0;
    }
    .swatch:hover { transform: scale(1.25); }
    .swatch.sel { outline-color: #1e3a5f; outline-offset: 1px; }
    .form-row { display: flex; gap: 5px; margin-top: 5px; }
    .fbtn {
      padding: 3px 10px;
      border: none;
      border-radius: 4px;
      font-size: .74rem;
      cursor: pointer;
      font-family: inherit;
      font-weight: 500;
      transition: opacity .1s;
    }
    .fbtn:hover { opacity: .85; }
    .fbtn-ok { background: #3a8cdf; color: #fff; }
    .fbtn-cancel { background: #dce3ea; color: #4a5a68; }

    /* ── Toast notification ──────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 22px; right: 22px;
      background: #1e3a5f;
      color: #fff;
      padding: 9px 18px;
      border-radius: 6px;
      font-size: .82rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s;
      z-index: 9999;
      max-width: 300px;
    }
    #toast.show { opacity: 1; }

    /* ── Reconnect banner ────────────────────────────────────────────── */
    #reconnectBanner {
      display: none;
      background: #fff8e1;
      border-bottom: 1px solid #ffe082;
      color: #5a4000;
      font-size: .8rem;
      padding: 8px 20px;
      align-items: center;
      gap: 10px;
    }
    #reconnectBanner.show { display: flex; }
    #reconnectBanner strong { flex: 1; }
    .rbtn {
      padding: 4px 14px;
      border: 1px solid #f0b800;
      border-radius: 5px;
      background: #ffe082;
      color: #3a2800;
      font-size: .78rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background .15s;
    }
    .rbtn:hover { background: #ffd740; }
    .rbtn-dismiss {
      padding: 4px 10px;
      border: none;
      background: transparent;
      color: #8a7040;
      font-size: .78rem;
      cursor: pointer;
      font-family: inherit;
    }
    .rbtn-dismiss:hover { color: #5a4000; }

    /* ── Drag and drop ───────────────────────────────────────────────── */
    .activity-item { cursor: grab; }
    .activity-item:active { cursor: grabbing; }
    .activity-item.dragging { opacity: .35; }
    table.calendar tbody td.day-cell.drag-over {
      outline: 2px dashed #3a8cdf;
      outline-offset: -3px;
      background: #e8f4fd !important;
    }

    /* ── Help bar ────────────────────────────────────────────────────── */
    .help-bar {
      background: #e8f4fd;
      border-top: 1px solid #c8dff0;
      color: #4a7a9b;
      font-size: .72rem;
      padding: 6px 20px;
      text-align: center;
    }
  </style>
</head>
<body>

<header>
  <h1>מתכנן שבועי</h1>
  <div class="header-btns">
    <button class="hbtn accent" id="openFileBtn" title="פתח קובץ JSON משותף מהרשת">פתח קובץ משותף</button>
    <button class="hbtn" id="refreshBtn" style="display:none" title="טען מחדש נתונים מהקובץ המשותף">רענן</button>
    <button class="hbtn" id="exportBtn" title="הורד נתונים כקובץ JSON">ייצוא JSON</button>
  </div>
</header>

<div class="status-bar">
  <span id="statusText">שומר מקומית בדפדפן זה (לא משותף)</span>
  <span id="saveIndicator"></span>
</div>

<div id="reconnectBanner">
  <strong id="reconnectMsg"></strong>
  <button class="rbtn" id="reconnectBtn">התחבר מחדש לקובץ המשותף</button>
  <button class="rbtn-dismiss" id="reconnectDismiss">סגור</button>
</div>

<div class="cal-wrap">
  <table class="calendar">
    <thead>
      <tr>
        <th>שבוע</th>
        <th>ראשון</th>
        <th>שני</th>
        <th>שלישי</th>
        <th>רביעי</th>
        <th>חמישי</th>
        <th>שישי</th>
        <th>שבת</th>
      </tr>
    </thead>
    <tbody id="calBody"></tbody>
  </table>
</div>

<div class="help-bar">
  לחץ <strong>+ הוסף</strong> בכל יום להוספת פעילות &nbsp;|&nbsp; רחף על פעילות לעריכה או מחיקה &nbsp;|&nbsp; <strong>גרור</strong> פעילות להזזה ליום אחר &nbsp;|&nbsp;
  השתמש ב<strong>פתח קובץ משותף</strong> לקישור קובץ JSON ברשת כדי שכל המשתמשים ישתפו את אותם הנתונים.
</div>

<div id="toast"></div>

<script>
// ── Color palette ─────────────────────────────────────────────────────────
const COLORS = [
  { bg: '#4a90d9', fg: '#fff' },  // blue
  { bg: '#5cb85c', fg: '#fff' },  // green
  { bg: '#e05c5c', fg: '#fff' },  // red
  { bg: '#f0a030', fg: '#fff' },  // orange
  { bg: '#9b59b6', fg: '#fff' },  // purple
  { bg: '#17a589', fg: '#fff' },  // teal
  { bg: '#e91e8c', fg: '#fff' },  // pink
  { bg: '#607d8b', fg: '#fff' },  // slate
  { bg: '#c8a000', fg: '#fff' },  // amber-dark
  { bg: '#795548', fg: '#fff' },  // brown
];
const DEFAULT_COLOR = COLORS[0];

// ── State ─────────────────────────────────────────────────────────────────
// data shape: { "YYYY-MM-DD": [ { id, text, bg, fg }, ... ] }
let data = {};
let fileHandle = null;      // FileSystemFileHandle when a shared file is open
let saveTimer = null;
let activeFormInfo = null;  // { formEl }
let dragState = null;       // { actId, fromKey } during a drag operation

// ── Utility helpers ───────────────────────────────────────────────────────
function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}

function toDateKey(d) {
  // Returns "YYYY-MM-DD" in LOCAL time to avoid UTC-shift issues
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function addDays(d, n) {
  const r = new Date(d);
  r.setDate(r.getDate() + n);
  return r;
}

function sundayOf(d) {
  const r = new Date(d);
  r.setDate(r.getDate() - r.getDay()); // getDay()==0 for Sun, so this always lands on Sunday
  return r;
}

function isoWeekNumber(d) {
  const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const dayNum = date.getUTCDay() || 7;
  date.setUTCDate(date.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
  return Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
}

function fmtShortDate(d) {
  return d.toLocaleDateString('he-IL', { month: 'short', day: 'numeric' });
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── Toast ─────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, duration = 2600) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), duration);
}

// ── Save indicator ────────────────────────────────────────────────────────
let saveIndTimer;
function flashSaveIndicator(text = 'נשמר') {
  const el = document.getElementById('saveIndicator');
  el.textContent = text;
  clearTimeout(saveIndTimer);
  saveIndTimer = setTimeout(() => { el.textContent = ''; }, 2000);
}

// ── IndexedDB — persist FileSystemFileHandle across page loads ─────────────
const IDB_NAME = 'WeeklyPlannerDB';
const IDB_STORE = 'meta';

function openIDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(IDB_NAME, 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore(IDB_STORE);
    req.onsuccess = e => res(e.target.result);
    req.onerror = e => rej(e.target.error);
  });
}
async function idbPut(key, val) {
  const db = await openIDB();
  const tx = db.transaction(IDB_STORE, 'readwrite');
  tx.objectStore(IDB_STORE).put(val, key);
  return new Promise((res, rej) => { tx.oncomplete = res; tx.onerror = e => rej(e.target.error); });
}
async function idbGet(key) {
  const db = await openIDB();
  const tx = db.transaction(IDB_STORE, 'readonly');
  const req = tx.objectStore(IDB_STORE).get(key);
  return new Promise((res, rej) => {
    req.onsuccess = e => res(e.target.result);
    req.onerror = e => rej(e.target.error);
  });
}

// ── LocalStorage — always-on local persistence ────────────────────────────
const LS_KEY = 'weeklyPlannerData_v1';

function loadLocal() {
  try {
    const s = localStorage.getItem(LS_KEY);
    return s ? JSON.parse(s) : {};
  } catch { return {}; }
}
function saveLocal() {
  try { localStorage.setItem(LS_KEY, JSON.stringify(data)); } catch {}
}

// ── File System Access API — shared file on network drive ─────────────────
async function writeToFile() {
  if (!fileHandle) return;
  try {
    const writable = await fileHandle.createWritable();
    await writable.write(JSON.stringify(data, null, 2));
    await writable.close();
    flashSaveIndicator('נשמר לקובץ');
  } catch (e) {
    console.error('File write error:', e);
    showToast('לא ניתן לשמור לקובץ המשותף. בדוק שהקובץ אינו נעול על ידי משתמש אחר.');
  }
}

async function readFromFile() {
  if (!fileHandle) return;
  try {
    const file = await fileHandle.getFile();
    const text = await file.text();
    if (text.trim()) {
      data = JSON.parse(text);
    } else {
      data = {};
    }
    saveLocal();
    renderCalendar();
    showToast('נטען מהקובץ המשותף.');
  } catch (e) {
    console.error('File read error:', e);
    showToast('לא ניתן לקרוא את הקובץ המשותף.');
  }
}

// Debounced save: immediate local, delayed file write
function scheduleSave() {
  saveLocal();
  flashSaveIndicator('שומר...');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    if (fileHandle) {
      await writeToFile();
    } else {
      flashSaveIndicator('נשמר מקומית');
    }
  }, 700);
}

// Open shared file (user picks file)
async function openSharedFile() {
  if (!window.showOpenFilePicker) {
    showToast('הדפדפן שלך אינו תומך ב-File System API. השתמש ב-Microsoft Edge או Google Chrome.');
    return;
  }
  try {
    const [handle] = await window.showOpenFilePicker({
      types: [{ description: 'JSON data file', accept: { 'application/json': ['.json'] } }],
      multiple: false,
    });
    await activateFileHandle(handle);
  } catch (e) {
    if (e.name !== 'AbortError') showToast('לא ניתן לפתוח את הקובץ.');
  }
}

async function activateFileHandle(handle) {
  fileHandle = handle;
  await idbPut('fileHandle', handle);
  document.getElementById('statusText').textContent =
    `קובץ משותף: ${handle.name} — שינויים נשמרים אוטומטית`;
  document.getElementById('refreshBtn').style.display = '';
  await readFromFile();
}

// On startup, try to reconnect to a previously used file handle.
// requestPermission() requires a user gesture, so it can only be called
// from a click handler. On page load we use queryPermission() only:
//   'granted' → auto-load silently
//   'prompt'  → show reconnect banner; load on button click
//   'denied'  → forget the handle, fall back to localStorage
async function tryRestoreFileHandle() {
  if (!window.showOpenFilePicker) return;
  try {
    const handle = await idbGet('fileHandle');
    if (!handle) return;

    const perm = await handle.queryPermission({ mode: 'readwrite' });

    if (perm === 'granted') {
      await activateFileHandle(handle);
    } else if (perm === 'prompt') {
      showReconnectBanner(handle);
    } else {
      // 'denied' — forget the handle
      await idbPut('fileHandle', null);
    }
  } catch {
    // Silently fall back to localStorage
  }
}

function showReconnectBanner(handle) {
  document.getElementById('reconnectMsg').textContent =
    `הקובץ המשותף "${handle.name}" שימש בעבר.`;
  const banner = document.getElementById('reconnectBanner');
  banner.classList.add('show');

  document.getElementById('reconnectBtn').onclick = async () => {
    banner.classList.remove('show');
    try {
      const perm = await handle.requestPermission({ mode: 'readwrite' });
      if (perm === 'granted') {
        await activateFileHandle(handle);
      } else {
        showToast('ההרשאה נדחתה — משתמש בשמירה מקומית.');
        await idbPut('fileHandle', null);
      }
    } catch {
      showToast('לא ניתן להתחבר מחדש לקובץ המשותף.');
    }
  };

  document.getElementById('reconnectDismiss').onclick = () => {
    banner.classList.remove('show');
  };
}

// ── Export / Import ───────────────────────────────────────────────────────
function exportJSON() {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const dateStr = new Date().toISOString().slice(0, 10);
  a.download = `weekly-planner-${dateStr}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('יוצא לקובץ.');
}

// ── Calendar rendering ────────────────────────────────────────────────────
function renderCalendar() {
  const tbody = document.getElementById('calBody');
  tbody.innerHTML = '';

  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const todayKey = toDateKey(today);
  const startSunday = addDays(sundayOf(today), -7); // start from Sunday of prev week

  const WEEKS = 6; // previous week + current week + 4 ahead

  for (let w = 0; w < WEEKS; w++) {
    const weekStart = addDays(startSunday, w * 7);
    const isPastRow = w === 0;

    const tr = document.createElement('tr');
    if (isPastRow) tr.classList.add('past-week');

    // Week number label — use Monday of this week for ISO week number
    const wkTd = document.createElement('td');
    wkTd.className = 'wk-label';
    wkTd.textContent = 'ש' + isoWeekNumber(addDays(weekStart, 1));
    tr.appendChild(wkTd);

    for (let d = 0; d < 7; d++) {
      const day = addDays(weekStart, d);
      const key = toDateKey(day);
      const isToday = key === todayKey;
      const isPast = key < todayKey;
      const isWeekend = d === 0 || d === 6; // Sun or Sat

      const td = document.createElement('td');
      td.className = 'day-cell';
      if (isToday) td.classList.add('is-today');
      if (isPast) td.classList.add('is-past');
      if (isWeekend) td.classList.add('is-weekend');
      td.dataset.key = key;

      // Drop target for drag-and-drop
      td.addEventListener('dragover', e => {
        if (!dragState) return;
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        td.classList.add('drag-over');
      });
      td.addEventListener('dragleave', e => {
        // Only remove when leaving the cell itself, not a child element
        if (!td.contains(e.relatedTarget)) td.classList.remove('drag-over');
      });
      td.addEventListener('drop', e => {
        e.preventDefault();
        td.classList.remove('drag-over');
        if (!dragState) return;
        moveActivity(dragState.fromKey, dragState.actId, key);
        dragState = null;
      });

      // Day header
      const headerDiv = document.createElement('div');
      headerDiv.className = 'day-header';
      const dateSpan = document.createElement('div');
      dateSpan.className = 'day-date';
      dateSpan.textContent = fmtShortDate(day);
      const numSpan = document.createElement('div');
      numSpan.className = isToday ? 'day-num today-num' : 'day-num';
      numSpan.textContent = day.getDate();
      headerDiv.appendChild(dateSpan);
      headerDiv.appendChild(numSpan);
      td.appendChild(headerDiv);

      // Activities container
      const actsDiv = document.createElement('div');
      actsDiv.className = 'activities';
      actsDiv.id = 'acts-' + key;
      renderActivitiesInto(actsDiv, key);
      td.appendChild(actsDiv);

      // Add button
      const addBtn = document.createElement('div');
      addBtn.className = 'add-btn';
      addBtn.textContent = '+ הוסף';
      addBtn.addEventListener('click', e => {
        e.stopPropagation();
        openForm(td, key, null);
      });
      td.appendChild(addBtn);

      tr.appendChild(td);
    }

    tbody.appendChild(tr);
  }
}

function renderActivitiesInto(container, key) {
  container.innerHTML = '';
  const acts = data[key] || [];
  acts.forEach(act => {
    const div = document.createElement('div');
    div.className = 'activity-item';
    div.style.background = act.bg;
    div.style.color = act.fg;
    div.draggable = true;

    const textSpan = document.createElement('span');
    textSpan.className = 'act-text';
    textSpan.textContent = act.text;

    const actions = document.createElement('span');
    actions.className = 'act-actions';

    const editIcon = document.createElement('span');
    editIcon.className = 'act-icon';
    editIcon.title = 'ערוך';
    editIcon.textContent = '✎';
    editIcon.addEventListener('click', e => {
      e.stopPropagation();
      const cell = div.closest('td');
      openForm(cell, key, act);
    });

    const delIcon = document.createElement('span');
    delIcon.className = 'act-icon';
    delIcon.title = 'מחק';
    delIcon.textContent = '✕';
    delIcon.addEventListener('click', e => {
      e.stopPropagation();
      deleteActivity(key, act.id);
    });

    // Drag events
    div.addEventListener('dragstart', e => {
      dragState = { actId: act.id, fromKey: key };
      e.dataTransfer.effectAllowed = 'move';
      // Defer so the browser snapshot is taken before the class applies
      setTimeout(() => div.classList.add('dragging'), 0);
    });
    div.addEventListener('dragend', () => {
      div.classList.remove('dragging');
      dragState = null;
    });

    actions.appendChild(editIcon);
    actions.appendChild(delIcon);
    div.appendChild(textSpan);
    div.appendChild(actions);
    container.appendChild(div);
  });
}

function refreshActivitiesUI(key) {
  const container = document.getElementById('acts-' + key);
  if (container) renderActivitiesInto(container, key);
}

// ── Activity form (add / edit) ────────────────────────────────────────────
function closeForm() {
  if (activeFormInfo) {
    activeFormInfo.formEl.remove();
    activeFormInfo = null;
  }
}

function openForm(cell, key, existing) {
  closeForm();

  let chosenColor = existing
    ? (COLORS.find(c => c.bg === existing.bg) || DEFAULT_COLOR)
    : DEFAULT_COLOR;

  const form = document.createElement('div');
  form.className = 'act-form';
  form.addEventListener('click', e => e.stopPropagation());

  // Text input
  const inp = document.createElement('input');
  inp.type = 'text';
  inp.placeholder = 'תאר את הפעילות...';
  inp.maxLength = 300;
  if (existing) inp.value = existing.text;
  form.appendChild(inp);

  // Color swatches
  const swatchRow = document.createElement('div');
  swatchRow.className = 'swatches';
  COLORS.forEach(c => {
    const s = document.createElement('div');
    s.className = 'swatch' + (c.bg === chosenColor.bg ? ' sel' : '');
    s.style.background = c.bg;
    s.title = 'Color';
    s.addEventListener('click', () => {
      swatchRow.querySelectorAll('.swatch').forEach(x => x.classList.remove('sel'));
      s.classList.add('sel');
      chosenColor = c;
    });
    swatchRow.appendChild(s);
  });
  form.appendChild(swatchRow);

  // Action buttons
  const row = document.createElement('div');
  row.className = 'form-row';

  const okBtn = document.createElement('button');
  okBtn.className = 'fbtn fbtn-ok';
  okBtn.textContent = existing ? 'עדכן' : 'הוסף';
  okBtn.addEventListener('click', () => {
    const text = inp.value.trim();
    if (!text) { inp.focus(); return; }
    if (existing) {
      updateActivity(key, existing.id, text, chosenColor);
    } else {
      addActivity(key, text, chosenColor);
    }
    closeForm();
  });

  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'fbtn fbtn-cancel';
  cancelBtn.textContent = 'ביטול';
  cancelBtn.addEventListener('click', closeForm);

  row.appendChild(okBtn);
  row.appendChild(cancelBtn);
  form.appendChild(row);

  // Insert after the activities container
  const actsDiv = cell.querySelector('.activities');
  actsDiv.after(form);

  activeFormInfo = { formEl: form };

  inp.focus();
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter') okBtn.click();
    if (e.key === 'Escape') closeForm();
  });
}

// ── Activity CRUD ─────────────────────────────────────────────────────────
function addActivity(key, text, color) {
  if (!data[key]) data[key] = [];
  data[key].push({ id: uid(), text, bg: color.bg, fg: color.fg });
  refreshActivitiesUI(key);
  scheduleSave();
}

function updateActivity(key, id, text, color) {
  const list = data[key];
  if (!list) return;
  const act = list.find(a => a.id === id);
  if (act) { act.text = text; act.bg = color.bg; act.fg = color.fg; }
  refreshActivitiesUI(key);
  scheduleSave();
}

function deleteActivity(key, id) {
  if (!data[key]) return;
  data[key] = data[key].filter(a => a.id !== id);
  if (data[key].length === 0) delete data[key];
  refreshActivitiesUI(key);
  scheduleSave();
}

function moveActivity(fromKey, actId, toKey) {
  const list = data[fromKey];
  if (!list) return;
  const idx = list.findIndex(a => a.id === actId);
  if (idx === -1) return;
  const [act] = list.splice(idx, 1);
  if (list.length === 0) delete data[fromKey];
  if (!data[toKey]) data[toKey] = [];
  data[toKey].push(act);
  refreshActivitiesUI(fromKey);
  refreshActivitiesUI(toKey);
  scheduleSave();
}

// ── App init ──────────────────────────────────────────────────────────────
async function init() {
  data = loadLocal();
  renderCalendar();

  // Attempt to re-connect to previously used shared file
  await tryRestoreFileHandle();

  // Close any open form when clicking outside
  document.addEventListener('click', () => closeForm());

  // Header buttons
  document.getElementById('openFileBtn').addEventListener('click', openSharedFile);
  document.getElementById('refreshBtn').addEventListener('click', async () => {
    await readFromFile();
  });
  document.getElementById('exportBtn').addEventListener('click', exportJSON);
}

init();
</script>
