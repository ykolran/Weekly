<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מתכנן שבועי</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <header>
    <div class="header-left">
      <button id="prevWeek" class="week-nav">▶</button>
    </div>
    <div class="header-middle">
      <img src="logo.png" alt="Logo" style="position:absolute; height: 50px; padding: 5px;" />
      <h1>נת"י - תוכנית שבועית</h1>
    </div>
    <div class="header-right">
      <button id="nextWeek" class="week-nav">◀</button>
    </div>
  </header>

  <div class="status-bar">
    <span id="statusText">מחבר לשרת...</span>
  </div>

  <div class="main-layout">
    <aside class="change-log" id="changeLog"></aside>
    <div class="main-right">
      <div class="cal-wrap">
        <table class="calendar">
          <thead>
            <tr>
              <th>שבוע</th>
              <th>ראשון</th>
              <th>שני</th>
              <th>שלישי</th>
              <th>רביעי</th>
              <th>חמישי</th>
              <th>שישי</th>
              <th>שבת</th>
            </tr>
          </thead>
          <tbody id="calBody"></tbody>
        </table>
      </div>

      <div class="help-bar">
        לחץ <strong>+ הוסף</strong> בכל יום להוספת פעילות &nbsp;|&nbsp; רחף על פעילות לעריכה או מחיקה &nbsp;|&nbsp;
        <strong>גרור</strong> פעילות להזזה ליום אחר
      </div>

      <div class="chat-container">
        <div class="chat-header">
          <h3>עוזר אישי</h3>
        </div>
        <div id="chatMessages" class="chat-messages"></div>
        <div class="chat-input-wrapper">
          <input id="chatInput" type="text" placeholder="שאל משהו..." />
          <button id="chatSend" class="chat-send-btn">שלח</button>
        </div>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script src="app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
</body>

</html>
